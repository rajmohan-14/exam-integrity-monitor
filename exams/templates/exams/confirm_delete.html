{% extends "exams/base.html" %}
{% block title %}Delete Exam{% endblock %}
{% block content %}
<div style="max-width:480px; margin:4rem auto">
    <div class="card" style="text-align:center; padding:2rem">
        <div style="font-size:40px; margin-bottom:1rem">⚠️</div>
        <h2 style="margin-bottom:0.5rem">Delete Exam?</h2>
        <p style="color:var(--text-secondary); margin-bottom:1.5rem; font-size:14px">
            <strong>{{ exam.title }}</strong> and all its questions and sessions will be permanently deleted.
            This cannot be undone.
        </p>
        <form method="post" style="display:flex; gap:12px; justify-content:center">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="/exams/{{ exam.id }}/" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
