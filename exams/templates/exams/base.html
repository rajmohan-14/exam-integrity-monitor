<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Exam Monitor{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; }
        nav { background: #1a1a1a; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; font-weight: 500; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e5e5e5; }
        .btn { display: inline-block; padding: 8px 16px; background: #1a1a1a; color: white; border-radius: 6px; text-decoration: none; font-size: 14px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; background: #e5e5e5; }
    </style>
</head>
<body>
    <nav>
        <a href="/exams/">Exam Monitor</a>
        <div style="display:flex; gap:1rem; align-items:center">
            {% if request.user.is_authenticated %}
                <span style="font-size:14px">{{ request.user.username }} · {{ request.user.role }}</span>
                <a href="/users/logout/" style="font-size:14px">Logout</a>
            {% else %}
                <a href="/users/login/" style="font-size:14px">Login</a>
                <a href="/users/signup/" style="font-size:14px">Sign up</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
